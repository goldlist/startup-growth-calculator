  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ─── Math Engine ─────────────────────────────────────────────────────────────

    function calcGrowth({ revenue, expenses, growth, cash }) {
      const g = growth / 100;

      let profitMonth = null;
      if (g > 0 && revenue > 0 && revenue < expenses) {
        profitMonth = Math.log(expenses / revenue) / Math.log(1 + g);
      } else if (revenue >= expenses) {
        profitMonth = 0;
      }

      const totalMonths = profitMonth !== null
        ? Math.max(Math.ceil(profitMonth) + 6, 24)
        : 36;

      const months = [];
      let cumBurn = 0;
      for (let n = 0; n <= totalMonths; n++) {
        const rev = revenue * Math.pow(1 + g, n);
        const burn = Math.max(0, expenses - rev);
        cumBurn += burn;
        months.push({
          month: n,
          revenue: rev,
          expenses: expenses,
          capitalNeeded: cumBurn,
          burn,
        });
      }

      const capitalNeeded = profitMonth !== null && profitMonth > 0
        ? months[Math.ceil(profitMonth)]?.capitalNeeded ?? cumBurn
        : profitMonth === 0 ? 0 : cumBurn;

      // Runway: how many months until cash runs out
      let runwayMonths = null;
      if (expenses > 0) {
        let balance = cash;
        for (let n = 0; n < 120; n++) {
          const rev = revenue * Math.pow(1 + g, n);
          balance -= Math.max(0, expenses - rev);
          if (balance <= 0) { runwayMonths = n; break; }
        }
      }

      const defaultAlive = profitMonth !== null && cash >= capitalNeeded;
      const monthlyBurn = Math.max(0, expenses - revenue);

      return { months, profitMonth, capitalNeeded, defaultAlive, runwayMonths, monthlyBurn };
    }

    // ─── URL State ────────────────────────────────────────────────────────────────

    function getDefaults() {
      const p = new URLSearchParams(window.location.search);
      return {
        revenue:  Number(p.get('r')) || 10000,
        expenses: Number(p.get('e')) || 25000,
        growth:   Number(p.get('g')) || 10,
        cash:     Number(p.get('c')) || 100000,
      };
    }

    function encodeState(v) {
      const p = new URLSearchParams({ r: v.revenue, e: v.expenses, g: v.growth, c: v.cash });
      window.history.replaceState(null, '', '?' + p.toString());
    }

    // ─── SVG Chart ───────────────────────────────────────────────────────────────

    function GrowthChart({ months, profitMonth }) {
      const svgRef = useRef(null);
      const PAD = { top: 20, right: 24, bottom: 36, left: 64 };

      if (!months.length) return null;

      const maxRev = Math.max(...months.map(m => m.revenue));
      const maxY = Math.max(maxRev, months[0].expenses) * 1.15;
      const minY = 0;
      const maxX = months[months.length - 1].month;

      // Dimensions — use a fixed viewBox, SVG scales responsively
      const W = 900, H = 220;
      const chartW = W - PAD.left - PAD.right;
      const chartH = H - PAD.top - PAD.bottom;

      const xScale = m => PAD.left + (m / maxX) * chartW;
      const yScale = v => PAD.top + chartH - ((v - minY) / (maxY - minY)) * chartH;

      // Revenue path
      const revPoints = months.map(m => `${xScale(m.month)},${yScale(m.revenue)}`).join(' ');
      const revArea = [
        `M ${xScale(0)},${yScale(0)}`,
        ...months.map(m => `L ${xScale(m.month)},${yScale(m.revenue)}`),
        `L ${xScale(maxX)},${yScale(0)}`,
        'Z'
      ].join(' ');

      // Expense line (flat)
      const expY = yScale(months[0].expenses);
      const expPath = `M ${xScale(0)},${expY} L ${xScale(maxX)},${expY}`;

      // Capital needed area (between expense line and revenue, where expense > revenue)
      const capPoints = months
        .filter(m => m.expenses > m.revenue)
        .map(m => `${xScale(m.month)},${yScale(m.revenue)}`);
      const capArea = capPoints.length > 1
        ? [
            `M ${capPoints[0]}`,
            ...capPoints.slice(1).map(p => `L ${p}`),
            `L ${xScale(months.filter(m => m.expenses > m.revenue).slice(-1)[0].month)},${expY}`,
            `L ${xScale(0)},${expY}`,
            'Z'
          ].join(' ')
        : null;

      // Y axis ticks
      const yTicks = [0, 0.25, 0.5, 0.75, 1].map(t => ({
        v: minY + t * (maxY - minY),
        y: yScale(minY + t * (maxY - minY)),
      }));

      // X axis ticks
      const tickStep = maxX <= 12 ? 2 : maxX <= 24 ? 4 : 6;
      const xTicks = [];
      for (let i = 0; i <= maxX; i += tickStep) xTicks.push(i);

      const profitX = profitMonth !== null && profitMonth > 0
        ? xScale(Math.min(profitMonth, maxX))
        : null;

      // Tooltip state
      const [tooltip, setTooltip] = useState(null);

      function handleMouseMove(e) {
        const rect = svgRef.current.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) / rect.width * W;
        const monthRaw = (svgX - PAD.left) / chartW * maxX;
        const monthIdx = Math.round(Math.max(0, Math.min(monthRaw, maxX)));
        const d = months[monthIdx];
        if (d) {
          setTooltip({
            x: xScale(d.month) / W * 100,
            y: Math.min(yScale(d.revenue), yScale(d.expenses)) / H * 100,
            data: d,
          });
        }
      }

      return (
        <div className="relative w-full" onMouseLeave={() => setTooltip(null)}>
          <svg
            ref={svgRef}
            viewBox={`0 0 ${W} ${H}`}
            className="w-full h-auto"
            onMouseMove={handleMouseMove}
            style={{ cursor: 'crosshair' }}
          >
            {/* Grid lines */}
            {yTicks.map(({ y, v }, i) => (
              <line key={i} x1={PAD.left} y1={y} x2={W - PAD.right} y2={y}
                stroke="#e5e7eb" strokeWidth="1" />
            ))}

            {/* Capital needed area */}
            {capArea && (
              <path d={capArea} fill="#d2f5ff" fillOpacity="0.7" />
            )}

            {/* Revenue area (subtle fill) */}
            <path d={revArea} fill="#22c55e" fillOpacity="0.08" />

            {/* Revenue curve */}
            <polyline
              points={revPoints}
              fill="none"
              stroke="#22c55e"
              strokeWidth="2.5"
              strokeLinejoin="round"
            />

            {/* Expense line */}
            <path d={expPath} stroke="#ef4444" strokeWidth="2" strokeDasharray="8 4" fill="none" />

            {/* Profitability marker */}
            {profitX && (
              <g>
                <line
                  x1={profitX} y1={PAD.top}
                  x2={profitX} y2={H - PAD.bottom}
                  stroke="#000" strokeWidth="1.5" strokeDasharray="4 3"
                />
                <rect x={profitX - 52} y={PAD.top} width={104} height={20} rx="3"
                  fill="#ebff52" />
                <text
                  x={profitX} y={PAD.top + 14}
                  textAnchor="middle"
                  fontSize="11"
                  fontFamily="Artex, system-ui"
                  fill="#000"
                  fontWeight="600"
                >
                  PROFITABLE ✓
                </text>
              </g>
            )}

            {/* Y axis labels */}
            {yTicks.map(({ y, v }, i) => (
              <text key={i} x={PAD.left - 8} y={y + 4}
                textAnchor="end" fontSize="11"
                fontFamily="Artex, system-ui" fill="#9ca3af">
                {v >= 1000000
                  ? `$${(v / 1000000).toFixed(1)}M`
                  : v >= 1000
                  ? `$${(v / 1000).toFixed(0)}k`
                  : `$${v.toFixed(0)}`}
              </text>
            ))}

            {/* X axis labels */}
            {xTicks.map(t => (
              <text key={t}
                x={xScale(t)} y={H - PAD.bottom + 18}
                textAnchor="middle" fontSize="11"
                fontFamily="Artex, system-ui" fill="#9ca3af">
                Mo {t}
              </text>
            ))}

            {/* Axes */}
            <line x1={PAD.left} y1={PAD.top} x2={PAD.left} y2={H - PAD.bottom}
              stroke="#d1d5db" strokeWidth="1" />
            <line x1={PAD.left} y1={H - PAD.bottom} x2={W - PAD.right} y2={H - PAD.bottom}
              stroke="#d1d5db" strokeWidth="1" />

            {/* Legend */}
            <g transform={`translate(${PAD.left + 8}, ${PAD.top + 4})`}>
              <line x1="0" y1="7" x2="16" y2="7" stroke="#22c55e" strokeWidth="2.5" />
              <text x="20" y="11" fontSize="11" fontFamily="Artex, system-ui" fill="#4b5563">Revenue</text>
              <line x1="70" y1="7" x2="86" y2="7" stroke="#ef4444" strokeWidth="2" strokeDasharray="5 3" />
              <text x="90" y="11" fontSize="11" fontFamily="Artex, system-ui" fill="#4b5563">Expenses</text>
              <rect x="160" y="1" width="14" height="12" fill="#d2f5ff" stroke="#93c5fd" strokeWidth="1" rx="2" />
              <text x="178" y="11" fontSize="11" fontFamily="Artex, system-ui" fill="#4b5563">Capital needed</text>
            </g>
          </svg>

          {/* Tooltip */}
          {tooltip && (
            <div
              className="absolute pointer-events-none bg-white border border-black rounded-lg p-3 text-sm font-ui shadow-lg z-10"
              style={{
                left: `${Math.min(tooltip.x, 75)}%`,
                top: `${Math.max(tooltip.y - 10, 5)}%`,
                transform: 'translateY(-100%)',
              }}
            >
              <div className="font-bold mb-1 text-black">Month {tooltip.data.month}</div>
              <div className="text-green-600">Revenue: ${Math.round(tooltip.data.revenue).toLocaleString()}</div>
              <div className="text-red-500">Expenses: ${Math.round(tooltip.data.expenses).toLocaleString()}</div>
              {tooltip.data.burn > 0 && (
                <div className="text-blue-600">Burn: ${Math.round(tooltip.data.burn).toLocaleString()}/mo</div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── Input Field ─────────────────────────────────────────────────────────────

    function InputField({ label, value, onChange, prefix, suffix, step = 1, min = 0 }) {
      const [raw, setRaw] = useState(String(value));
      const [focused, setFocused] = useState(false);

      useEffect(() => {
        if (!focused) setRaw(String(value));
      }, [value, focused]);

      return (
        <div className="flex flex-col gap-1">
          <label className="text-xs font-ui text-gray-500 uppercase tracking-wider">{label}</label>
          <div className="flex items-center border border-black rounded-lg px-3 py-2 gap-1 bg-white focus-within:ring-2 focus-within:ring-[#ebff52]">
            {prefix && <span className="text-gray-400 font-ui text-sm">{prefix}</span>}
            <input
              type="number"
              step={step}
              min={min}
              className="w-full outline-none font-ui text-black bg-transparent text-sm"
              value={raw}
              onFocus={e => { setFocused(true); e.target.select(); }}
              onChange={e => setRaw(e.target.value)}
              onBlur={() => {
                setFocused(false);
                const num = parseFloat(raw);
                if (!isNaN(num) && num >= 0) onChange(num);
                else setRaw(String(value));
              }}
              onKeyDown={e => e.key === 'Enter' && e.target.blur()}
            />
            {suffix && <span className="text-gray-400 font-ui text-sm">{suffix}</span>}
          </div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────────

    function App() {
      const defaults = useMemo(getDefaults, []);
      const [revenue,  setRevenue]  = useState(defaults.revenue);
      const [expenses, setExpenses] = useState(defaults.expenses);
      const [growth,   setGrowth]   = useState(defaults.growth);
      const [cash,     setCash]     = useState(defaults.cash);
      const [copied,   setCopied]   = useState(false);

      const result = useMemo(
        () => calcGrowth({ revenue, expenses, growth, cash }),
        [revenue, expenses, growth, cash]
      );

      useEffect(() => encodeState({ revenue, expenses, growth, cash }), [revenue, expenses, growth, cash]);

      function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }

      const { months, profitMonth, capitalNeeded, defaultAlive, runwayMonths, monthlyBurn } = result;

      const fmt = n =>
        n >= 1_000_000 ? `$${(n / 1_000_000).toFixed(1)}M`
        : n >= 1000    ? `$${(n / 1000).toFixed(0)}k`
        :                `$${Math.round(n).toLocaleString()}`;

      return (
        <div className="font-ui" style={{ backgroundColor: '#fff' }}>

          <main className="max-w-5xl mx-auto px-4 py-3">

            {/* Chart */}
            <div className="fadein-1">
              <GrowthChart months={months} profitMonth={profitMonth} />
            </div>

            {/* Status Pill + inline description */}
            <div className="fadein-2 flex items-center gap-3 mt-2 mb-3">
              <span className={`inline-flex items-center gap-2 px-4 py-1.5 rounded-full border-2 font-ui font-bold text-sm flex-shrink-0 ${
                defaultAlive
                  ? 'bg-green-50 border-green-500 text-green-700'
                  : 'bg-red-50 border-red-500 text-red-700'
              }`}>
                {defaultAlive ? '✓ Default Alive' : '✗ Default Dead'}
              </span>
              <span className="text-gray-500 font-ui text-xs">
                {defaultAlive
                  ? `Profitability in ${Math.ceil(profitMonth)} months — without raising another dollar.`
                  : profitMonth !== null
                    ? `Needs ${fmt(capitalNeeded)} to reach profitability in ${Math.ceil(profitMonth)} months. ${runwayMonths != null ? `${runwayMonths} months runway.` : ''}`
                    : `Will never reach profitability at current growth rate. Grow faster or cut expenses.`
                }
              </span>
            </div>

            {/* Metric Cards */}
            <div className="fadein-3 grid grid-cols-3 gap-3 mb-3">
              {[
                { label: 'Months to Profit', value: profitMonth !== null ? Math.ceil(profitMonth) : '∞' },
                { label: 'Capital Needed',   value: fmt(capitalNeeded) },
                { label: 'Monthly Burn',     value: fmt(monthlyBurn) },
              ].map(({ label, value }) => (
                <div key={label} className="border border-black rounded-xl p-3">
                  <div className="text-xs text-gray-400 uppercase tracking-wider mb-0.5 font-ui">{label}</div>
                  <div className="font-display text-2xl text-black">{value}</div>
                </div>
              ))}
            </div>

            {/* Inputs */}
            <div className="fadein-4 grid grid-cols-2 md:grid-cols-4 gap-3 p-4 border border-black rounded-xl bg-gray-50 mb-3">
              <InputField label="Monthly Revenue"  value={revenue}  onChange={setRevenue}  prefix="$" />
              <InputField label="Monthly Expenses" value={expenses} onChange={setExpenses} prefix="$" />
              <InputField label="Monthly Growth"   value={growth}   onChange={setGrowth}   suffix="%" step={0.1} />
              <InputField label="Cash on Hand"     value={cash}     onChange={setCash}     prefix="$" />
            </div>

            {/* Actions */}
            <div className="fadein-5">
              <button
                onClick={copyLink}
                className="button w-button"
              >
                {copied ? '✓ Copied!' : 'Copy Shareable Link'}
              </button>
            </div>

          </main>

  <script src="webflow-export/js/webflow.js"></script>
  <script>
    // Button text scramble — matches TechTO's GSAP ScrambleTextPlugin effect
    (function () {
      const chars = 'abcdefghijklmnopqrstuvwxyz';
      const initialized = new WeakSet();

      function addScramble(btn) {
        if (initialized.has(btn)) return;
        initialized.add(btn);

        let frame, running = false, original = '';

        btn.addEventListener('mouseenter', () => {
          original = btn.textContent.trim();
          if (running) cancelAnimationFrame(frame);
          running = true;
          const start = performance.now();
          const duration = 300;

          (function tick(now) {
            const t = Math.min((now - start) / duration, 1);
            const resolved = Math.floor(t * original.length);
            btn.textContent = original.split('').map((c, i) =>
              c === ' ' ? ' ' : i < resolved ? c : chars[Math.floor(Math.random() * chars.length)]
            ).join('');
            if (t < 1) {
              frame = requestAnimationFrame(tick);
            } else {
              btn.textContent = original;
              running = false;
            }
          })(performance.now());
        });

        btn.addEventListener('mouseleave', () => {
          if (running) {
            cancelAnimationFrame(frame);
            btn.textContent = original;
            running = false;
          }
        });
      }

      function init() {
        document.querySelectorAll('.button').forEach(addScramble);
      }

      // Init on load, then watch for React-rendered buttons
      init();
      const observer = new MutationObserver(init);
      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
